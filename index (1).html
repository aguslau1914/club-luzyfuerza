<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Club Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0c0b;
    --bg-2: #111413;
    --surface: #181c1a;
    --surface-2: #1f2422;
    --surface-3: #2a312e;
    --border: #2e3633;
    --border-2: #3a4441;
    --accent: #c4ff3a;
    --accent-dim: #9bd02a;
    --accent-dark: #6b8f1c;
    --text: #f0f2ec;
    --text-dim: #8b918a;
    --text-faint: #5a605c;
    --danger: #ff5757;
    --warning: #ffb04a;
    --success: #4ade80;
    --info: #5dd3ff;
    --gold: #ffd84a;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Archivo', sans-serif;
    font-size: 15px;
    line-height: 1.4;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  body {
    background:
      radial-gradient(ellipse at top, rgba(196, 255, 58, 0.04), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    padding-bottom: 84px;
  }

  /* ============ HEADER ============ */
  .header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10, 12, 11, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .club-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .club-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--accent);
    color: #0a0c0b;
    display: grid;
    place-items: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.02em;
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(196, 255, 58, 0.25);
  }

  .club-info { min-width: 0; }
  .club-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 19px;
    letter-spacing: 0.06em;
    line-height: 1;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .club-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 3px;
    font-weight: 600;
  }

  .cat-selector {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 10px;
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .view-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.04em;
    margin: 16px 16px 4px;
    line-height: 1;
  }
  .view-title .accent { color: var(--accent); }

  .view-sub {
    color: var(--text-dim);
    font-size: 12px;
    margin: 0 16px 14px;
    letter-spacing: 0.04em;
  }

  /* ============ BOTTOM NAV ============ */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    padding: 8px 12px 14px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    pointer-events: none;
  }
  .bottom-nav-inner {
    pointer-events: auto;
    max-width: 480px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 6px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .nav-btn {
    background: transparent;
    border: 0;
    color: var(--text-dim);
    padding: 8px 4px 6px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    font-family: 'Archivo', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn.active {
    background: var(--accent);
    color: #0a0c0b;
  }
  .nav-btn:not(.active):active { background: var(--surface-2); }

  /* ============ BUTTONS ============ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 0;
    background: var(--surface-2);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 12px;
    font-family: 'Archivo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent);
    color: #0a0c0b;
  }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border-2);
  }
  .btn-danger {
    background: rgba(255, 87, 87, 0.12);
    color: var(--danger);
    border: 1px solid rgba(255, 87, 87, 0.3);
  }
  .btn-sm {
    padding: 8px 12px;
    font-size: 12px;
    border-radius: 9px;
  }
  .btn-full { width: 100%; }
  .btn svg { width: 16px; height: 16px; }

  .fab {
    position: fixed;
    bottom: 92px;
    right: 16px;
    width: 56px;
    height: 56px;
    border-radius: 18px;
    background: var(--accent);
    color: #0a0c0b;
    border: 0;
    box-shadow: 0 8px 24px rgba(196, 255, 58, 0.4);
    cursor: pointer;
    display: grid;
    place-items: center;
    z-index: 90;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.93); }
  .fab svg { width: 26px; height: 26px; }

  /* ============ CARDS ============ */
  .section { padding: 0 16px; }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; opacity: 0.6; }
  .empty-state h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    margin: 0 0 8px;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .empty-state p { margin: 0 0 18px; font-size: 13px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .card:active { transform: scale(0.99); background: var(--surface-2); }

  /* PLAYER CARD */
  .player-card {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .player-num {
    width: 44px;
    height: 44px;
    border-radius: 11px;
    background: var(--surface-2);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .player-num.no-num { color: var(--text-faint); font-size: 16px; }
  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-weight: 700;
    font-size: 15px;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-meta {
    display: flex;
    gap: 10px;
    margin-top: 3px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .player-meta .dot { color: var(--text-faint); }
  .pos-pill {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.05em;
  }
  .pos-ARQ { background: rgba(255, 184, 74, 0.15); color: var(--warning); }
  .pos-DEF { background: rgba(93, 211, 255, 0.15); color: var(--info); }
  .pos-MED { background: rgba(196, 255, 58, 0.15); color: var(--accent); }
  .pos-DEL { background: rgba(255, 87, 87, 0.15); color: var(--danger); }

  .status-badge {
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 6px;
    border-radius: 4px;
    margin-left: auto;
  }
  .status-activo { display: none; }
  .status-lesionado { background: rgba(255, 87, 87, 0.15); color: var(--danger); }
  .status-suspendido { background: rgba(255, 184, 74, 0.15); color: var(--warning); }
  .status-baja { background: var(--surface-3); color: var(--text-faint); }

  /* TRAINING CARD */
  .training-card .card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .date-block {
    text-align: center;
    min-width: 48px;
  }
  .date-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
    color: var(--accent);
  }
  .date-mon {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-top: 2px;
    font-weight: 700;
  }
  .training-info { flex: 1; padding-left: 14px; }
  .training-type {
    font-weight: 700;
    font-size: 14px;
    margin: 0;
  }
  .training-stats {
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 10px;
    font-weight: 600;
  }
  .stat-presente { color: var(--success); }
  .stat-tarde { color: var(--warning); }
  .stat-ausente { color: var(--danger); }

  /* MATCH CARD */
  .match-card {
    padding: 0;
    overflow: hidden;
  }
  .match-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .match-date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .venue-pill {
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.1em;
  }
  .venue-local { background: rgba(196, 255, 58, 0.15); color: var(--accent); }
  .venue-visitante { background: rgba(93, 211, 255, 0.15); color: var(--info); }
  .status-pill {
    padding: 3px 7px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .status-pill.programado { background: var(--surface-3); color: var(--text-dim); }
  .status-pill.jugado { background: rgba(74, 222, 128, 0.15); color: var(--success); }

  .match-body {
    padding: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .match-side {
    flex: 1;
    text-align: center;
  }
  .match-side.us { text-align: left; }
  .match-side.them { text-align: right; }
  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .team-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    margin-top: 4px;
  }
  .match-vs {
    color: var(--text-faint);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
  }
  .match-footer {
    padding: 10px 14px;
    background: var(--bg-2);
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
  }
  .convocados-count {
    color: var(--accent);
    font-weight: 700;
  }

  /* ============ MODALS / SHEETS ============ */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .sheet {
    background: var(--bg-2);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.1);
    border: 1px solid var(--border);
    border-bottom: 0;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .sheet-header {
    position: sticky;
    top: 0;
    background: rgba(17, 20, 19, 0.92);
    backdrop-filter: blur(10px);
    padding: 16px 18px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border-2);
    border-radius: 2px;
    margin: 6px auto 12px;
  }
  .sheet-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    margin: 0;
    letter-spacing: 0.04em;
  }
  .sheet-close {
    background: var(--surface-2);
    color: var(--text);
    border: 0;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    cursor: pointer;
  }
  .sheet-body { padding: 18px; }
  .sheet-footer {
    position: sticky;
    bottom: 0;
    background: rgba(17, 20, 19, 0.92);
    backdrop-filter: blur(10px);
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .form-input,
  .form-select,
  .form-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 11px;
    font-family: 'Archivo', sans-serif;
    font-size: 15px;
    transition: all 0.15s;
    outline: none;
  }
  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    border-color: var(--accent);
    background: var(--surface-2);
  }
  .form-textarea { resize: vertical; min-height: 70px; font-family: inherit; }

  .form-input-readonly {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 12px 14px;
    border-radius: 11px;
    font-family: 'Archivo', sans-serif;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: not-allowed;
    user-select: none;
  }
  .readonly-icon {
    background: var(--accent);
    color: #0a0c0b;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 12px;
  }

  .form-row {
    display: grid;
    gap: 10px;
  }
  .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
  .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .seg-control {
    display: grid;
    gap: 4px;
    background: var(--surface);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .seg-control.cols-2 { grid-template-columns: 1fr 1fr; }
  .seg-control.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .seg-control.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .seg-btn {
    background: transparent;
    border: 0;
    color: var(--text-dim);
    padding: 9px 6px;
    border-radius: 8px;
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .seg-btn.active {
    background: var(--accent);
    color: #0a0c0b;
  }

  /* ATTENDANCE ROW */
  .attendance-list { display: flex; flex-direction: column; gap: 6px; }
  .attendance-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .att-num {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--surface-2);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .att-name {
    flex: 1;
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .att-buttons {
    display: flex;
    gap: 4px;
  }
  .att-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border-2);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    display: grid;
    place-items: center;
    font-weight: 700;
    transition: all 0.15s;
  }
  .att-btn[data-val="presente"].active {
    background: var(--success);
    border-color: var(--success);
    color: #0a0c0b;
  }
  .att-btn[data-val="tarde"].active {
    background: var(--warning);
    border-color: var(--warning);
    color: #0a0c0b;
  }
  .att-btn[data-val="ausente"].active {
    background: var(--danger);
    border-color: var(--danger);
    color: white;
  }
  .att-btn[data-val="justificado"].active {
    background: var(--info);
    border-color: var(--info);
    color: #0a0c0b;
  }

  /* CONVOCADOS / TITULARES */
  .pick-list { display: flex; flex-direction: column; gap: 6px; }
  .pick-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pick-row.selected {
    border-color: var(--accent);
    background: rgba(196, 255, 58, 0.06);
  }
  .pick-row.titular {
    border-color: var(--accent);
    background: rgba(196, 255, 58, 0.12);
  }
  .pick-row.disabled { opacity: 0.4; pointer-events: none; }
  .pick-check {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid var(--border-2);
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .pick-row.selected .pick-check,
  .pick-row.titular .pick-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0c0b;
  }
  .pick-check svg { width: 14px; height: 14px; opacity: 0; }
  .pick-row.selected .pick-check svg,
  .pick-row.titular .pick-check svg { opacity: 1; }
  .titular-badge {
    font-size: 9px;
    background: var(--accent);
    color: #0a0c0b;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 800;
    letter-spacing: 0.08em;
  }

  /* PERFORMANCE ROW */
  .perf-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .perf-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .perf-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .perf-stat {
    background: var(--surface-2);

<div id="app"></div>

<script>
// ============================================================
// CLUB MANAGER — Single file app
// ============================================================

const STORAGE_KEY = 'clubData_v1';

// ----- State -----
let state = {
  clubName: '',
  activeCategoryId: null,
  categories: [],
  activeTab: 'players',
  filter: 'all',
  password: null,
  adminUser: 'admin',
};

let isAuthenticated = false; // session flag, not persisted
let needsCategoryPick = true; // session flag - show category picker after login / on app load

const POSITIONS = [
  { id: 'ARQ', label: 'Arquero' },
  { id: 'DEF', label: 'Defensor' },
  { id: 'MED', label: 'Mediocampista' },
  { id: 'DEL', label: 'Delantero' },
];

const STATUSES = [
  { id: 'activo', label: 'Activo' },
  { id: 'lesionado', label: 'Lesionado' },
  { id: 'suspendido', label: 'Suspendido' },
  { id: 'baja', label: 'Baja' },
];

const TRAINING_TYPES = [
  { id: 'fisico', label: 'Físico' },
  { id: 'tactico', label: 'Táctico' },
  { id: 'tecnico', label: 'Técnico' },
  { id: 'partido', label: 'Partido reducido' },
  { id: 'libre', label: 'Libre' },
];

// ----- Storage -----
// Works in both Claude artifacts (window.storage) and external hosting (localStorage)
const _hasWindowStorage = typeof window !== 'undefined' &&
  window.storage && typeof window.storage.set === 'function';

async function _storageSet(key, value) {
  let ok = false;
  if (_hasWindowStorage) {
    try { await window.storage.set(key, value); ok = true; } catch (e) {}
  }
  try { localStorage.setItem(key, value); ok = true; } catch (e) {}
  return ok;
}
async function _storageGet(key) {
  if (_hasWindowStorage) {
    try {
      const r = await window.storage.get(key);
      if (r && r.value != null) return r.value;
    } catch (e) {}
  }
  try { return localStorage.getItem(key); } catch (e) { return null; }
}
async function _storageDelete(key) {
  if (_hasWindowStorage) {
    try { await window.storage.delete(key); } catch (e) {}
  }
  try { localStorage.removeItem(key); } catch (e) {}
}

// ----- Supabase Sync Layer -----
const SUPABASE_CONFIG_KEY = 'club_supabase_config';
const SYNC_ROW_ID = 'main';

let supabaseClient = null;
let realtimeChannel = null;
let lastCloudPushAt = 0;
let isApplyingRemote = false;

function getSupabaseConfig() {
  try {
    const raw = localStorage.getItem(SUPABASE_CONFIG_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function setSupabaseConfig(cfg) {
  try {
    localStorage.setItem(SUPABASE_CONFIG_KEY, JSON.stringify(cfg));
    return true;
  } catch { return false; }
}

function clearSupabaseConfig() {
  try { localStorage.removeItem(SUPABASE_CONFIG_KEY); } catch {}
}

async function initCloudSync() {
  const cfg = getSupabaseConfig();
  if (!cfg || !cfg.url || !cfg.anonKey || !window.supabase) return false;
  try {
    supabaseClient = window.supabase.createClient(cfg.url, cfg.anonKey);
    // Pull latest from cloud
    const cloudState = await fetchCloudData();
    if (cloudState) {
      isApplyingRemote = true;
      state = { ...state, ...cloudState };
      applyDefaults();
      isApplyingRemote = false;
      // Also cache locally
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
      render();
    } else {
      // Cloud is empty → push our local data up
      await pushCloudData();
    }
    setupRealtimeChannel();
    return true;
  } catch (e) {
    console.error('Cloud sync init failed:', e);
    supabaseClient = null;
    return false;
  }
}

async function fetchCloudData() {
  if (!supabaseClient) return null;
  try {
    const { data, error } = await supabaseClient
      .from('club_data')
      .select('data')
      .eq('id', SYNC_ROW_ID)
      .maybeSingle();
    if (error) {
      console.warn('Cloud fetch error:', error);
      return null;
    }
    return data?.data || null;
  } catch (e) {
    console.warn('Cloud fetch threw:', e);
    return null;
  }
}

async function pushCloudData() {
  if (!supabaseClient) return false;
  try {
    const { error } = await supabaseClient
      .from('club_data')
      .upsert({
        id: SYNC_ROW_ID,
        data: state,
        updated_at: new Date().toISOString(),
      });
    if (error) throw error;
    lastCloudPushAt = Date.now();
    return true;
  } catch (e) {
    console.error('Cloud push failed:', e);
    return false;
  }
}

function setupRealtimeChannel() {
  if (!supabaseClient) return;
  if (realtimeChannel) {
    try { supabaseClient.removeChannel(realtimeChannel); } catch {}
    realtimeChannel = null;
  }
  realtimeChannel = supabaseClient
    .channel('club_data_changes')
    .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'club_data', filter: `id=eq.${SYNC_ROW_ID}` },
      (payload) => {
        if (!payload.new || !payload.new.data) return;
        // Ignore our own writes (within 3s window)
        if (Date.now() - lastCloudPushAt < 3000) return;
        const incoming = payload.new.data;
        const incomingJSON = JSON.stringify(incoming);
        const currentJSON = JSON.stringify(state);
        if (incomingJSON === currentJSON) return;
        // Apply remote change
        isApplyingRemote = true;
        state = { ...state, ...incoming };
        applyDefaults();
        isApplyingRemote = false;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
        // Only re-render if no sheet open (don't disrupt editing)
        if (!$('#sheet-overlay')) {
          render();
          toast('🔄 Actualizado desde otro celular');
        }
      }
    )
    .subscribe();
}

function disconnectCloudSync() {
  if (realtimeChannel && supabaseClient) {
    try { supabaseClient.removeChannel(realtimeChannel); } catch {}
  }
  realtimeChannel = null;
  supabaseClient = null;
  clearSupabaseConfig();
}

let lastSaveStatus = null; // 'ok' | 'failed' | 'cloud_failed'

async function saveState() {
  // Don't save if we're applying a remote update (avoid echo loop)
  if (isApplyingRemote) return true;

  const json = JSON.stringify(state);
  // Always save local cache first (fast, offline-friendly)
  const ok = await _storageSet(STORAGE_KEY, json);
  if (!ok) {
    lastSaveStatus = 'failed';
    toast('⚠️ Falló el guardado local. Exportá un backup YA.');
    return false;
  }
  // Push to cloud if connected
  if (supabaseClient) {
    const cloudOk = await pushCloudData();
    if (!cloudOk) {
      lastSaveStatus = 'cloud_failed';
      toast('☁️ Guardado local OK, pero falló sync con la nube');
      return false;
    }
  }
  lastSaveStatus = 'ok';
  return true;
}

function applyDefaults() {
  // Pre-configured club so the app never goes through onboarding
  if (!state.clubName) state.clubName = 'Luz y Fuerza';
  if (!state.adminUser) state.adminUser = 'admin';
  if (!state.password) state.password = 'luzfuerza2026';
  if (!state.categories || state.categories.length === 0) {
    const id1 = 'cat_primera_' + Math.random().toString(36).slice(2, 8);
    const id2 = 'cat_reserva_' + Math.random().toString(36).slice(2, 8);
    state.categories = [
      { id: id1, name: 'Primera', players: [], trainings: [], matches: [] },
      { id: id2, name: 'Reserva', players: [], trainings: [], matches: [] },
    ];
    state.activeCategoryId = id1;
  }
  if (!state.activeCategoryId || !state.categories.find(c => c.id === state.activeCategoryId)) {
    state.activeCategoryId = state.categories[0].id;
  }
  state.activeTab = state.activeTab || 'players';
  state.filter = state.filter || 'all';
}

async function loadState() {
  try {
    const value = await _storageGet(STORAGE_KEY);
    if (value) {
      const parsed = JSON.parse(value);
      state = { ...state, ...parsed };
    }
  } catch (e) {
    // First time use or storage unavailable
  }
  applyDefaults();
}

// ----- Utils -----
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

const uid = (prefix = 'id') => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;

const escapeHTML = (str) => String(str ?? '').replace(/[&<>"']/g, (c) => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
}[c]));

const todayISO = () => {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
};

const fmtDate = (iso) => {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const days = ['DOM', 'LUN', 'MAR', 'MIÉ', 'JUE', 'VIE', 'SÁB'];
  const months = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
  return {
    day: d,
    mon: months[m - 1],
    full: `${days[date.getDay()]} ${d} ${months[m - 1]}`,
    fullLong: `${d}/${m}/${y}`,
  };
};

const fmtTime = (t) => t || '';

const getActiveCategory = () => state.categories.find(c => c.id === state.activeCategoryId);

const toast = (msg) => {
  $$('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
};

function renderPlayersView() {
  const cat = getActiveCategory();
  const players = cat.players;

  if (players.length === 0) {
    return `
      <h2 class="view-title">PLAN<span class="accent">TEL</span></h2>
      <p class="view-sub">${escapeHTML(cat.name)}</p>
      <div class="empty-state">
        <div class="emoji">👥</div>
        <h3>Sin jugadores todavía</h3>
        <p>Empezá cargando los pibes del plantel</p>
        <button id="add-player" class="btn btn-primary">+ Agregar jugador</button>
        <div style="margin-top:26px;padding-top:20px;border-top:1px solid var(--border);max-width:280px;margin-left:auto;margin-right:auto;">
          <p style="font-size:12px;color:var(--text-dim);margin:0 0 8px;">¿Tenías jugadores cargados antes?</p>
          <button id="empty-restore" class="btn btn-ghost btn-sm">📥 Restaurar de backup</button>
        </div>
      </div>
    `;
  }

  // Group by position
  const filtered = state.filter === 'all' ? players : players.filter(p => p.position === state.filter);
  const grouped = {};
  POSITIONS.forEach(p => { grouped[p.id] = []; });
  filtered.forEach(p => {
    if (grouped[p.position]) grouped[p.position].push(p);
    else { grouped['MED'] = grouped['MED'] || []; grouped['MED'].push(p); }
  });

  // Sort each group by number
  Object.values(grouped).forEach(arr => arr.sort((a, b) => (a.number || 999) - (b.number || 999)));

  return `
    <h2 class="view-title">PLAN<span class="accent">TEL</span></h2>
    <p class="view-sub">${escapeHTML(cat.name)} · ${players.length} jugador${players.length !== 1 ? 'es' : ''}</p>
    <div class="filter-bar">
      <button class="filter-chip ${state.filter === 'all' ? 'active' : ''}" data-filter="all">Todos</button>
      <button class="filter-chip ${state.filter === 'ARQ' ? 'active' : ''}" data-filter="ARQ">Arqueros</button>
      <button class="filter-chip ${state.filter === 'DEF' ? 'active' : ''}" data-filter="DEF">Defensas</button>
      <button class="filter-chip ${state.filter === 'MED' ? 'active' : ''}" data-filter="MED">Medios</button>
      <button class="filter-chip ${state.filter === 'DEL' ? 'active' : ''}" data-filter="DEL">Delanteros</button>
    </div>
    <div class="section">
      ${POSITIONS.map(pos => {
        const list = grouped[pos.id] || [];
        if (list.length === 0) return '';
        return `
          ${state.filter === 'all' ? `
            <div class="group-header">
              <div class="group-header-line"></div>
              <span class="group-header-label">${pos.label.toUpperCase()}S · ${list.length}</span>
              <div class="group-header-line"></div>
            </div>
          ` : ''}
          ${list.map(p => renderPlayerCard(p)).join('')}
        `;
      }).join('')}
    </div>
    <button id="add-player" class="fab" aria-label="Agregar jugador">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  `;
}

function renderPlayerCard(p) {
  return `
    <div class="card player-card" data-player="${p.id}">

function calcAge(birth) {
  const [y, m, d] = birth.split('-').map(Number);
  const now = new Date();
  let age = now.getFullYear() - y;
  if (now.getMonth() + 1 < m || (now.getMonth() + 1 === m && now.getDate() < d)) age--;
  return age;
}

function calcPlayerStats(playerId) {
  const cat = getActiveCategory();
  const trainings = cat.trainings;
  const matches = cat.matches.filter(m => m.status === 'jugado');

  let presente = 0, total = 0;
  trainings.forEach(t => {
    const v = t.attendance?.[playerId];
    if (v && v !== 'justificado') {
      total++;
      if (v === 'presente') presente++;
    } else if (v === 'justificado') {
      // doesn't count against
    } else if (Object.keys(t.attendance || {}).length > 0) {
      // had attendance taken but player wasn't marked = ignore
    }
  });
  const attendancePct = total > 0 ? Math.round((presente / total) * 100) : 0;

  let goals = 0, assists = 0, yellow = 0, red = 0, minutes = 0, matchesPlayed = 0;
  const ratings = [];
  const recentRatings = [];
  matches.forEach(m => {
    const perf = m.performances?.[playerId];
    if (!perf || !perf.played) return;
    matchesPlayed++;
    goals += perf.goals || 0;
    assists += perf.assists || 0;
    yellow += perf.yellow || 0;
    red += perf.red || 0;
    minutes += perf.minutes || 0;
    if (perf.rating) ratings.push(perf.rating);
    if (perf.rating) recentRatings.push({ rival: m.rival, rating: perf.rating, date: m.date });
  });
  const avgRating = ratings.length ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1) : null;
  recentRatings.sort((a, b) => b.date.localeCompare(a.date));

  return {
    attendancePct, matchesPlayed, goals, assists, yellow, red, minutes,
    avgRating, recentRatings: recentRatings.slice(0, 5),
  };
}

              <div class="att-num">${p.number || '—'}</div>
              <div class="att-name">${escapeHTML(p.name)}</div>
              <div class="att-buttons" data-player="${p.id}">
                <button class="att-btn ${val === 'presente' ? 'active' : ''}" data-val="presente" title="Presente">✓</button>
                <button class="att-btn ${val === 'tarde' ? 'active' : ''}" data-val="tarde" title="Tarde">T</button>
                <button class="att-btn ${val === 'ausente' ? 'active' : ''}" data-val="ausente" title="Ausente">✕</button>
                <button class="att-btn ${val === 'justificado' ? 'active' : ''}" data-val="justificado" title="Justificado">J</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="form-group mt-16">
        <label class="form-label">Notas (opcional)</label>
        <textarea id="tr-notes" class="form-textarea" placeholder="Cómo estuvo la sesión...">${escapeHTML(data.notes)}</textarea>
      </div>

      <div class="flex gap-6 mt-12">
        <button id="mark-all-pres" class="btn btn-ghost btn-sm flex-1">Marcar todos presentes</button>
        <button id="clear-all" class="btn btn-ghost btn-sm flex-1">Limpiar</button>
      </div>

      ${isEdit ? `<button id="del-training" class="btn btn-danger btn-full mt-16">Eliminar sesión</button>` : ''}
    `,
    footer: `
      <button class="btn btn-ghost flex-1" onclick="closeSheet()">Cancelar</button>
      <button id="save-training" class="btn btn-primary flex-1">${isEdit ? 'Guardar' : 'Crear'}</button>
    `,
  });

  const attendance = { ...(data.attendance || {}) };

  function bindAttButtons() {
    $$('.att-buttons').forEach(group => {
      const pid = group.dataset.player;
      $$('.att-btn', group).forEach(btn => {
        btn.onclick = () => {
          const val = btn.dataset.val;
          if (attendance[pid] === val) {
            delete attendance[pid];
            btn.classList.remove('active');
          } else {
            attendance[pid] = val;
            $$('.att-btn', group).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
          }
        };
      });
    });
  }
  bindAttButtons();

  $('#mark-all-pres').onclick = () => {
    players.forEach(p => { attendance[p.id] = 'presente'; });
    $$('.att-buttons').forEach(g => {
      $$('.att-btn', g).forEach(b => b.classList.toggle('active', b.dataset.val === 'presente'));
    });
  };
  $('#clear-all').onclick = () => {
    Object.keys(attendance).forEach(k => delete attendance[k]);
    $$('.att-btn').forEach(b => b.classList.remove('active'));
  };

  $('#save-training').onclick = async () => {
    const obj = {
      id: t?.id || uid('t'),
      date: $('#tr-date').value || todayISO(),
      type: $('#tr-type').value,
      attendance,
      notes: $('#tr-notes').value.trim(),
    };
    if (isEdit) {
      const idx = cat.trainings.findIndex(x => x.id === t.id);
      cat.trainings[idx] = obj;
    } else {
      cat.trainings.push(obj);
    }
    await saveState();
    closeSheet();
    render();
    toast(isEdit ? 'Asistencia guardada' : 'Entrenamiento creado');
  };

  $('#del-training')?.addEventListener('click', async () => {
    if (!confirm('¿Eliminar este entrenamiento?')) return;
    cat.trainings = cat.trainings.filter(x => x.id !== t.id);
    await saveState();
    closeSheet();
    render();
    toast('Eliminado');
  });
}

function renderMatchesView() {
  const cat = getActiveCategory();
  if (cat.players.length === 0) {
    return `
      <h2 class="view-title">PAR<span class="accent">TIDOS</span></h2>
      <p class="view-sub">${escapeHTML(cat.name)}</p>
      <div class="empty-state">
        <div class="emoji">⚽</div>
        <h3>Primero agregá jugadores</h3>
        <p>Andá a "Plantel" para armar el equipo</p>
      </div>
    `;
  }

  const matches = [...cat.matches];
  const upcoming = matches.filter(m => m.status === 'programado').sort((a, b) => a.date.localeCompare(b.date));
  const played = matches.filter(m => m.status === 'jugado').sort((a, b) => b.date.localeCompare(a.date));

  if (matches.length === 0) {
    return `
      <h2 class="view-title">PAR<span class="accent">TIDOS</span></h2>
      <p class="view-sub">${escapeHTML(cat.name)}</p>
      <div class="empty-state">
        <div class="emoji">⚽</div>
        <h3>Sin partidos cargados</h3>
        <p>Programá tu próximo partido y elegí los convocados</p>
        <button id="add-match" class="btn btn-primary">+ Nuevo partido</button>
      </div>
    `;
  }

  return `
    <h2 class="view-title">PAR<span class="accent">TIDOS</span></h2>
    <p class="view-sub">${matches.length} partido${matches.length !== 1 ? 's' : ''} · ${played.length} jugado${played.length !== 1 ? 's' : ''}</p>
    <div class="section">
      ${upcoming.length > 0 ? `
        <div class="group-header" style="margin-top:0;">
          <span class="group-header-label">PRÓXIMOS</span>
          <div class="group-header-line"></div>
        </div>
        ${upcoming.map(m => renderMatchCard(m)).join('')}
      ` : ''}
      ${played.length > 0 ? `
        <div class="group-header">
          <span class="group-header-label">HISTORIAL</span>
          <div class="group-header-line"></div>
        </div>
        ${played.map(m => renderMatchCard(m)).join('')}
      ` : ''}
    </div>
    <button id="add-match" class="fab" aria-label="Nuevo partido">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  `;
}

function renderMatchCard(m) {
  const date = fmtDate(m.date);
  const isPlayed = m.status === 'jugado';
  const ourScore = m.result?.ourScore;
  const theirScore = m.result?.theirScore;
  let resultClass = '';
  if (isPlayed && ourScore != null && theirScore != null) {
    if (ourScore > theirScore) resultClass = 'win';
    else if (ourScore < theirScore) resultClass = 'loss';
    else resultClass = 'draw';
  }

  return `
    <div class="card match-card" data-match="${m.id}">
      <div class="match-header">
        <div class="match-date-row">
          <span>${date.full}</span>
          ${m.time ? `<span>· ${m.time}</span>` : ''}
          <span class="venue-pill venue-${m.venue}">${m.venue === 'local' ? 'LOCAL' : 'VISITA'}</span>
        </div>
        <span class="status-pill ${m.status}">${isPlayed ? 'JUGADO' : 'PROGR.'}</span>
      </div>
      <div class="match-body">
        <div class="match-side us">
          <div class="team-name">${escapeHTML(state.clubName).slice(0, 12)}</div>
          ${isPlayed && ourScore != null ? `<div class="team-score">${ourScore}</div>` : ''}
        </div>
        <div class="match-vs">VS</div>
        <div class="match-side them">
          <div class="team-name">${escapeHTML(m.rival || '?').slice(0, 12)}</div>
          ${isPlayed && theirScore != null ? `<div class="team-score">${theirScore}</div>` : ''}
        </div>
      </div>
      <div class="match-footer">
        <span>${m.convocados?.length ? `<span class="convocados-count">${m.convocados.length}</span> convocados` : 'Sin convocados'}</span>
        ${isPlayed ? `<span>${Object.values(m.performances || {}).filter(p => p.rating).length} calificados</span>` : `<span>Tocá para gestionar →</span>`}
      </div>
    </div>
  `;
}

function openConvocadosPicker(matchId) {
  const cat = getActiveCategory();
  const m = cat.matches.find(x => x.id === matchId);
  const players = [...cat.players]
    .filter(p => p.status !== 'baja')
    .sort((a, b) => (a.number || 999) - (b.number || 999));
  const selected = new Set(m.convocados || []);

  openSheet({
    title: 'Convocados',
    body: `
      <div class="flex between center mb-12">
        <span style="color:var(--text-dim);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">
          <span id="conv-count" style="color:var(--accent);">${selected.size}</span> seleccionados
        </span>
        <div class="flex gap-6">
          <button id="conv-all" class="btn btn-ghost btn-sm">Todos</button>
          <button id="conv-none" class="btn btn-ghost btn-sm">Ninguno</button>
        </div>
      </div>
      <div class="pick-list">
        ${players.map(p => `
          <div class="pick-row ${selected.has(p.id) ? 'selected' : ''} ${p.status === 'lesionado' || p.status === 'suspendido' ? 'disabled' : ''}" data-player="${p.id}">
            <div class="pick-check">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="player-num" style="width:34px;height:34px;font-size:18px;">${p.number || '—'}</div>
            <div class="player-info">
              <div class="player-name">${escapeHTML(p.name)}${p.isJuvenil ? ' <span class="juvenil-tag">JUV</span>' : ''}</div>
              <div class="player-meta">
                <span class="pos-pill pos-${p.position}">${p.position}</span>
                ${p.status !== 'activo' ? `<span class="status-badge status-${p.status}">${p.status}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `,
    footer: `
      <button class="btn btn-ghost flex-1" onclick="closeSheet()">Cancelar</button>
      <button id="save-conv" class="btn btn-primary flex-1">Guardar</button>
    `,
  });

  $$('.pick-row').forEach(row => {
    if (row.classList.contains('disabled')) return;
    row.addEventListener('click', () => {
      const pid = row.dataset.player;
      if (selected.has(pid)) {
        selected.delete(pid);
        row.classList.remove('selected');
      } else {
        selected.add(pid);
        row.classList.add('selected');
      }
      $('#conv-count').textContent = selected.size;
    });
  });

  $('#conv-all').onclick = () => {
    players.forEach(p => {
      if (p.status === 'activo') selected.add(p.id);
    });
    $$('.pick-row').forEach(r => {
      if (!r.classList.contains('disabled')) r.classList.add('selected');
    });
    $('#conv-count').textContent = selected.size;
  };
  $('#conv-none').onclick = () => {
    selected.clear();
    $$('.pick-row').forEach(r => r.classList.remove('selected'));
    $('#conv-count').textContent = 0;
  };

  $('#save-conv').onclick = async () => {
    m.convocados = Array.from(selected);
    // Clean titulares that are no longer convocados
    m.titulares = (m.titulares || []).filter(id => m.convocados.includes(id));
    await saveState();
    closeSheet();
    setTimeout(() => openMatchManage(matchId), 200);
    toast(`${selected.size} convocados`);
  };
}

function openTitularesPicker(matchId) {
  const cat = getActiveCategory();
  const m = cat.matches.find(x => x.id === matchId);
  const convocados = (m.convocados || []).map(id => cat.players.find(p => p.id === id)).filter(Boolean);
  convocados.sort((a, b) => (a.number || 999) - (b.number || 999));
  const titulares = new Set(m.titulares || []);

  openSheet({
    title: 'Titulares (XI inicial)',
    body: `
      <div class="flex between center mb-12">
        <span style="color:var(--text-dim);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">
          <span id="tit-count" style="color:var(--accent);">${titulares.size}</span>/11
        </span>
      </div>
      <div class="pick-list">
        ${convocados.map(p => `
          <div class="pick-row ${titulares.has(p.id) ? 'titular' : ''}" data-player="${p.id}">
            <div class="pick-check">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="player-num" style="width:34px;height:34px;font-size:18px;">${p.number || '—'}</div>
            <div class="player-info">
              <div class="player-name">${escapeHTML(p.name)}${p.isJuvenil ? ' <span class="juvenil-tag">JUV</span>' : ''}</div>
              <div class="player-meta">
                <span class="pos-pill pos-${p.position}">${p.position}</span>
              </div>
            </div>
            ${titulares.has(p.id) ? `<span class="titular-badge">TITULAR</span>` : ''}
          </div>
        `).join('')}
      </div>
    `,
    footer: `
      <button class="btn btn-ghost flex-1" onclick="closeSheet()">Cancelar</button>
      <button id="save-tit" class="btn btn-primary flex-1">Guardar</button>
    `,
  });

  $$('.pick-row').forEach(row => {
    row.addEventListener('click', () => {
      const pid = row.dataset.player;
      if (titulares.has(pid)) {
        titulares.delete(pid);
        row.classList.remove('titular');
        row.querySelector('.titular-badge')?.remove();
      } else {
        titulares.add(pid);
        row.classList.add('titular');
        if (!row.querySelector('.titular-badge')) {
          const badge = document.createElement('span');
          badge.className = 'titular-badge';
          badge.textContent = 'TITULAR';
          row.appendChild(badge);
        }
      }
      $('#tit-count').textContent = titulares.size;
    });
  });

  $('#save-tit').onclick = async () => {
    m.titulares = Array.from(titulares);
    await saveState();
    closeSheet();
    setTimeout(() => openMatchManage(matchId), 200);
    toast('Titulares guardados');
  };
}

function shareConvocadosWA(matchId) {
  const cat = getActiveCategory();
  const m = cat.matches.find(x => x.id === matchId);
  const convocados = (m.convocados || [])
    .map(id => cat.players.find(p => p.id === id))
    .filter(Boolean)
    .sort((a, b) => (a.number || 999) - (b.number || 999));

  const date = fmtDate(m.date);
  const venueText = m.venue === 'local' ? 'LOCAL 🏠' : 'VISITANTE ✈️';

  let msg = `⚽ *${state.clubName.toUpperCase()}* - ${cat.name}\n`;
  msg += `\n*CONVOCADOS* vs ${m.rival}\n`;
  msg += `📅 ${date.full}\n`;
  if (m.time) msg += `🕐 ${m.time} hs\n`;
  msg += `📍 ${venueText}`;
  if (m.field) msg += ` - ${m.field}`;
  msg += `\n\n`;
  convocados.forEach((p, i) => {
    const isTitular = (m.titulares || []).includes(p.id);
    msg += `${(i + 1).toString().padStart(2, '0')}. `;
    if (p.number) msg += `(${p.number}) `;
    msg += p.name;
    if (p.isJuvenil) msg += ` 🌱`;
    if (isTitular) msg += ` ⭐`;
    msg += `\n`;
  });
  if (m.notes) msg += `\n📝 ${m.notes}\n`;
  msg += `\n⭐ Titular  🌱 Juvenil\n`;
  msg += `\n¡Vamos arriba! 💪`;

  openSheet({
    title: 'Compartir convocados',
    body: `
      <p style="color:var(--text-dim);font-size:13px;margin:0 0 12px;">Esta es la lista que se va a mandar:</p>
      <div class="preview-box">${escapeHTML(msg)}</div>
      <button id="copy-msg" class="btn btn-ghost btn-full mt-12">📋 Copiar</button>
    `,
    footer: `
      <button class="btn btn-ghost flex-1" onclick="closeSheet()">Cerrar</button>
      <button id="send-wa" class="btn btn-primary flex-1">📱 Abrir WhatsApp</button>
    `,
  });

  $('#send-wa').onclick = () => {
    const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  };
  $('#copy-msg').onclick = async () => {
    try {
      await navigator.clipboard.writeText(msg);
      toast('Copiado al portapapeles');
    } catch {
      // fallback: select text
      const range = document.createRange();
      range.selectNode($('.preview-box'));
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      try { document.execCommand('copy'); toast('Copiado'); } catch { toast('No se pudo copiar'); }
    }
  };
}

function openResultEditor(matchId, firstTime) {
  const cat = getActiveCategory();
  const m = cat.matches.find(x => x.id === matchId);
  if (firstTime) m.status = 'jugado';

  const convocados = (m.convocados || [])
    .map(id => cat.players.find(p => p.id === id))
    .filter(Boolean)
    .sort((a, b) => {
      const aTit = (m.titulares || []).includes(a.id) ? 0 : 1;
      const bTit = (m.titulares || []).includes(b.id) ? 0 : 1;
      if (aTit !== bTit) return aTit - bTit;
      return (a.number || 999) - (b.number || 999);
    });

  // Initialize performances for any convocado missing
  convocados.forEach(p => {
    if (!m.performances[p.id]) {
      const isTit = (m.titulares || []).includes(p.id);
      m.performances[p.id] = {
        played: true, // default to played so rating slider is visible
        starter: isTit,
        minutes: isTit ? 90 : 30,
        goals: 0, assists: 0, yellow: 0, red: 0, rating: null,
      };
    }
  });

  openSheet({
    title: `Resultado vs ${m.rival}`,
    body: `
      <div class="form-group">
        <label class="form-label">Resultado final</label>
        <div class="flex gap-6 center">
          <input id="r-us" class="form-input text-center" type="number" min="0" max="50" value="${m.result?.ourScore ?? ''}" placeholder="0" style="font-family:'Bebas Neue',sans-serif;font-size:28px;">
          <span style="color:var(--text-faint);font-family:'Bebas Neue',sans-serif;font-size:24px;">VS</span>
          <input id="r-them" class="form-input text-center" type="number" min="0" max="50" value="${m.result?.theirScore ?? ''}" placeholder="0" style="font-family:'Bebas Neue',sans-serif;font-size:28px;">
        </div>
        <div class="hint text-center">${escapeHTML(state.clubName)} vs ${escapeHTML(m.rival)}</div>
      </div>

      <label class="form-label" style="margin-bottom:8px;">⭐ Calificaciones · 1 a 10 por jugador</label>
      <div class="hint" style="margin-bottom:10px;">Deslizá el círculo verde para puntuar. Tocá "NO" si alguien no jugó.</div>
      <div id="perf-list">
        ${convocados.map(p => renderPerfRow(p, m.performances[p.id])).join('')}
      </div>

      <button id="del-match-2" class="btn btn-danger btn-full mt-16">Eliminar partido</button>
    `,
    footer: `
      <button class="btn btn-ghost flex-1" onclick="closeSheet()">Cancelar</button>
      <button id="save-result" class="btn btn-primary flex-1">Guardar</button>
    `,
  });

  // Bind perf row interactions
  bindPerfRows(m);

  $('#save-result').onclick = async () => {
    m.result = {
      ourScore: $('#r-us').value === '' ? null : parseInt($('#r-us').value),
      theirScore: $('#r-them').value === '' ? null : parseInt($('#r-them').value),
    };
    m.status = 'jugado';
    await saveState();
    closeSheet();
    setTimeout(() => openMatchManage(matchId), 200);
    toast('Resultado guardado');
  };

  $('#del-match-2').onclick = async () => {
    if (!confirm('¿Eliminar este partido?')) return;
    cat.matches = cat.matches.filter(x => x.id !== m.id);
    await saveState();
    closeSheet();
    render();
    toast('Partido eliminado');
  };
}

          <div class="flex between" style="font-size:9px;color:var(--text-faint);">

function bindPerfRows(m) {
  $$('.perf-row').forEach(row => {
    const pid = row.dataset.player;
    const perf = m.performances[pid];

    $$('.played-btn', row).forEach(btn => {
      btn.onclick = () => {
        const played = btn.dataset.play === '1';
        perf.played = played;
        $$('.played-btn', row).forEach(b => b.classList.toggle('active', b === btn));
        row.querySelector('.perf-content').style.display = played ? '' : 'none';
        if (!played) {
          perf.minutes = 0;
        } else if (perf.starter && !perf.minutes) {
          perf.minutes = 90;
        }
      };
    });

    $$('.step-up', row).forEach(b => b.onclick = () => {
      const stat = b.dataset.stat;
      perf[stat] = (perf[stat] || 0) + 1;
      row.querySelector(`[data-stat="${stat}"].perf-stat-val`).textContent = perf[stat];
    });
    $$('.step-down', row).forEach(b => b.onclick = () => {
      const stat = b.dataset.stat;
      perf[stat] = Math.max(0, (perf[stat] || 0) - 1);
      row.querySelector(`[data-stat="${stat}"].perf-stat-val`).textContent = perf[stat];
    });

    const slider = row.querySelector('.rating-slider');
    slider.oninput = () => {
      const v = parseFloat(slider.value);
      perf.rating = v;
      row.querySelector('.rating-value').textContent = v;
      row.querySelector('.rating-label span:first-child').textContent = `Calificación · ${v}/10`;
    };
  });
}

function renderStatsView() {
  const cat = getActiveCategory();
  if (cat.players.length === 0) {
    return `
      <h2 class="view-title">STA<span class="accent">TS</span></h2>
      <div class="empty-state">
        <div class="emoji">📊</div>
        <h3>Sin datos todavía</h3>
        <p>Cargá jugadores, entrenamientos y partidos</p>
      </div>
    `;
  }

  const matches = cat.matches.filter(m => m.status === 'jugado');
  const trainings = cat.trainings;
  let wins = 0, draws = 0, losses = 0, gf = 0, ga = 0;
  matches.forEach(m => {
    const o = m.result?.ourScore, t = m.result?.theirScore;
    if (o == null || t == null) return;
    gf += o; ga += t;
    if (o > t) wins++; else if (o < t) losses++; else draws++;
  });

  // Player stats
  const playerStats = cat.players.map(p => ({ player: p, ...calcPlayerStats(p.id) }));
  const goleadores = playerStats.filter(s => s.goals > 0).sort((a, b) => b.goals - a.goals).slice(0, 5);
  const asistentes = playerStats.filter(s => s.assists > 0).sort((a, b) => b.assists - a.assists).slice(0, 5);
  const ratings = playerStats.filter(s => s.avgRating != null && s.matchesPlayed >= 2)
    .sort((a, b) => parseFloat(b.avgRating) - parseFloat(a.avgRating)).slice(0, 5);
  const asistencia = playerStats
    .filter(s => trainings.length > 0)
    .sort((a, b) => b.attendancePct - a.attendancePct).slice(0, 5);
  const tarjetas = playerStats.filter(s => s.yellow + s.red > 0)
    .sort((a, b) => (b.yellow * 2 + b.red * 5) - (a.yellow * 2 + a.red * 5)).slice(0, 5);

  return `
    <h2 class="view-title">STA<span class="accent">TS</span></h2>
    <p class="view-sub">Equipo · ${escapeHTML(cat.name)}</p>

    <div class="section">
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-box-label">Partidos jugados</div>
          <div class="stat-box-val">${matches.length}</div>
          <div class="stat-box-sub">${wins}G · ${draws}E · ${losses}P</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Goles</div>
          <div class="stat-box-val">${gf}<span style="color:var(--text-faint);font-size:24px;"> : ${ga}</span></div>
          <div class="stat-box-sub">${matches.length ? (gf / matches.length).toFixed(1) : '0'} por partido</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Entrenos</div>
          <div class="stat-box-val">${trainings.length}</div>
          <div class="stat-box-sub">${avgAttendancePct(cat)}% asist. media</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Jugadores</div>
          <div class="stat-box-val">${cat.players.filter(p => p.status === 'activo').length}</div>
          <div class="stat-box-sub">${cat.players.length} total</div>
        </div>
      </div>

      ${renderRankingList('⚽ Goleadores', goleadores, 'goals', 'gol')}
      ${renderRankingList('🎯 Asistentes', asistentes, 'assists', 'asist.')}
      ${renderRankingList('⭐ Mejor promedio', ratings, 'avgRating', 'avg', true)}
      ${renderRankingList('🏃 Asistencia entrenos', asistencia, 'attendancePct', '%')}
      ${renderRankingList('🟨 Más amonestados', tarjetas, 'yellow', 'amar.', false, 'red')}

      ${cumpleNext(cat).length > 0 ? `
        <div class="ranking-list">
          <div class="ranking-title">🎂 Próximos cumpleaños</div>
          ${cumpleNext(cat).map(p => `
            <div class="ranking-row">
              <div class="ranking-name">${escapeHTML(p.name)}</div>
              <div class="ranking-val" style="color:var(--text-dim);">${p.daysAway === 0 ? 'HOY!' : `en ${p.daysAway}d`}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}

function avgAttendancePct(cat) {
  if (cat.trainings.length === 0 || cat.players.length === 0) return 0;
  const totals = cat.players.map(p => calcPlayerStats(p.id).attendancePct);
  if (totals.length === 0) return 0;
  return Math.round(totals.reduce((a, b) => a + b, 0) / totals.length);
}

function cumpleNext(cat) {
  const today = new Date();
  return cat.players
    .filter(p => p.birthdate)
    .map(p => {
      const [_, m, d] = p.birthdate.split('-').map(Number);
      let next = new Date(today.getFullYear(), m - 1, d);
      if (next < today) next = new Date(today.getFullYear() + 1, m - 1, d);
      const days = Math.ceil((next - today) / (1000 * 60 * 60 * 24));
      return { ...p, daysAway: days };
    })
    .filter(p => p.daysAway <= 14)
    .sort((a, b) => a.daysAway - b.daysAway);
}

function renderRankingList(title, list, key, unit, isFloat = false, secondaryKey = null) {
  if (list.length === 0) return '';
  return `
    <div class="ranking-list">
      <div class="ranking-title">${title}</div>
      ${list.map((s, i) => `
        <div class="ranking-row">
          <div class="ranking-rank ${i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''}">${i + 1}</div>
          <div class="ranking-name">${escapeHTML(s.player.name)}</div>
          <div class="ranking-val">${isFloat ? s[key] : s[key]}${secondaryKey && s[secondaryKey] > 0 ? ` <span style="color:var(--danger);">+${s[secondaryKey]}🟥</span>` : ''} ${unit}</div>
        </div>
      `).join('')}
    </div>
  `;
}

  if (pCard) {

  }
  // Training card -> edit
  const tCard = e.target.closest('.training-card');
  if (tCard) {

  }
  // Match card -> manage
  const mCard = e.target.closest('.match-card');
  if (mCard) {
    openMatchManage(mCard.dataset.match);
    return;
  }
  // Filter chips
  const chip = e.target.closest('.filter-chip');
  if (chip) {
    state.filter = chip.dataset.filter;
    renderView();
    return;
  }
  // FAB
  if (e.target.closest('#add-player')) { openPlayerForm(); return; }
  if (e.target.closest('#add-training')) { openTrainingForm(); return; }
  if (e.target.closest('#add-match')) { openMatchForm(); return; }
  if (e.target.closest('#empty-restore')) { importData(); return; }

  // More view actions
  if (e.target.closest('#edit-club')) { openClubNameEdit(); return; }
  if (e.target.closest('#manage-cats')) { openCategoryManage(); return; }
  if (e.target.closest('#change-pwd')) { openChangePassword(); return; }
  if (e.target.closest('#logout')) { doLogout(); return; }
  if (e.target.closest('#sync-settings')) { openSyncSettings(); return; }
  if (e.target.closest('#export-data')) { exportData(); return; }
  if (e.target.closest('#import-data')) { importData(); return; }
  if (e.target.closest('#reset-data')) { resetData(); return; }
});

      if (oldPwd !== state.password) { toast('La clave actual no coincide'); return; }

    if (!newPwd) { toast('La clave es obligatoria'); return; }
    if (newPwd !== newPwd2) { toast('Las claves no coinciden'); return; }
    state.adminUser = 'admin';
    state.password = newPwd;
    await saveState();
    closeSheet();
    render();
    toast('Clave actualizada ✓');
  };
}

function doLogout() {
  if (!confirm('¿Cerrar sesión? Te va a pedir la clave para volver.')) return;
  isAuthenticated = false;
  render();
}

function openSyncSettings() {
  const cfg = getSupabaseConfig();
  const isConnected = !!supabaseClient;
  const isConfigured = !!cfg;

  openSheet({
    title: 'Sincronización en la nube',
    body: `
      ${isConnected ? `
        <div class="alert-row" style="background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.25);color:var(--success);">
          ✅ Conectado a Supabase. Tus cambios se sincronizan al toque con todos los celulares que tengan estas mismas credenciales.
        </div>
        <div class="form-group">
          <label class="form-label">URL del proyecto</label>
          <div class="form-input-readonly" style="font-size:11px;font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;">${escapeHTML(cfg.url)}</div>
        </div>
        <div class="action-list">
          <div class="action-row" id="sync-share-creds">
            <div class="action-icon">📤</div>
            <div class="action-text">
              <div class="action-title">Compartir con otro celular</div>
              <div class="action-desc">Copia las credenciales para mandar por WhatsApp</div>
            </div>
          </div>
          <div class="action-row" id="sync-pull">
            <div class="action-icon">🔄</div>
            <div class="action-text">
              <div class="action-title">Refrescar desde la nube</div>
              <div class="action-desc">Forzar la sincronización ahora</div>
            </div>
          </div>
          <div class="action-row" id="sync-disconnect">
            <div class="action-icon" style="color:var(--danger);">🔌</div>
            <div class="action-text">
              <div class="action-title" style="color:var(--danger);">Desconectar sincronización</div>
              <div class="action-desc">Volver a usar solo este celular</div>
            </div>
          </div>
        </div>
      ` : `
        <div class="alert-row" style="background:rgba(93,211,255,0.1);border-color:rgba(93,211,255,0.25);color:var(--info);">
          ℹ️ Conectá tu base Supabase para que todos los celulares (DT, ayudante, presi) compartan el mismo plantel en tiempo real.
        </div>
        <div class="form-group">
          <label class="form-label">URL del proyecto Supabase</label>
          <input id="sync-url" class="form-input" placeholder="https://xxxxx.supabase.co" type="url" value="${cfg?.url || ''}">
        </div>
        <div class="form-group">
          <label class="form-label">Anon Key (clave pública)</label>
          <textarea id="sync-key" class="form-textarea" placeholder="eyJhbGciOi..." rows="4">${cfg?.anonKey || ''}</textarea>
        </div>
        <details style="margin-top:12px;">
          <summary>📖 Cómo configurar Supabase (primera vez)</summary>
          <ol style="color:var(--text-dim);font-size:12px;padding-left:20px;line-height:1.6;">
            <li>Creá cuenta gratis en <b>supabase.com</b></li>
            <li>Click en <b>"New Project"</b>, elegí nombre y contraseña</li>
            <li>Esperá ~2 min que se cree</li>
            <li>Andá a <b>SQL Editor</b> (icono &lt;&gt; izquierda) → <b>New query</b></li>
            <li>Pegá el SQL que te paso por chat y ejecutalo (botón "Run")</li>
            <li>Andá a <b>Settings → API</b> (engranaje izquierda)</li>
            <li>Copiá <b>Project URL</b> y <b>anon public</b> key, pegalos arriba</li>
            <li>Tocá "Conectar" abajo</li>
          </ol>
        </details>
      `}
    `,
    footer: isConnected ? `
      <button class="btn btn-primary btn-full" onclick="closeSheet()">Cerrar</button>
    ` : `
      <button class="btn btn-ghost flex-1" onclick="closeSheet()">Cancelar</button>
      <button id="sync-connect" class="btn btn-primary flex-1">Conectar</button>
    `,
  });

  if (!isConnected) {
    $('#sync-connect').onclick = async () => {
      const url = $('#sync-url').value.trim().replace(/\/+$/, '');
      const anonKey = $('#sync-key').value.trim();
      if (!url || !anonKey) { toast('Faltan URL o Anon Key'); return; }
      if (!url.startsWith('http')) { toast('La URL tiene que empezar con https://'); return; }
      if (!window.supabase) { toast('No se cargó la librería de Supabase. Revisá tu conexión.'); return; }

      // Test connection
      $('#sync-connect').textContent = 'Conectando...';
      $('#sync-connect').disabled = true;
      try {
        const testClient = window.supabase.createClient(url, anonKey);
        const { error } = await testClient.from('club_data').select('id').limit(1);
        // Error codes: PGRST116 = no rows, PGRST301 = empty, both OK
        if (error && error.code && !['PGRST116', 'PGRST301'].includes(error.code)) {
          toast('Conexión fallida: ' + (error.message || error.code).slice(0, 50));
          $('#sync-connect').textContent = 'Conectar';
          $('#sync-connect').disabled = false;
          return;
        }
      } catch (e) {
        toast('No se pudo conectar: ' + (e.message || 'error').slice(0, 50));
        $('#sync-connect').textContent = 'Conectar';
        $('#sync-connect').disabled = false;
        return;
      }

      setSupabaseConfig({ url, anonKey });
      const ok = await initCloudSync();
      closeSheet();
      if (ok) {
        toast('✅ Conectado a la nube');
      } else {
        toast('⚠️ Conectado pero sync inicial falló');
      }
      render();
    };
  } else {
    $('#sync-share-creds').onclick = async () => {
      const text =
        `🔗 SINCRONIZACIÓN DEL CLUB ${state.clubName.toUpperCase()}\n\n` +
        `1. Abrí la app: ${window.location.origin + window.location.pathname}\n` +
        `2. Iniciá sesión\n` +
        `3. Andá a Más → Sincronización\n` +
        `4. Pegá estos datos:\n\n` +
        `URL:\n${cfg.url}\n\n` +
        `Anon Key:\n${cfg.anonKey}\n\n` +
        `5. Tocá "Conectar". Listo, vas a ver los mismos datos.`;
      try {
        await navigator.clipboard.writeText(text);
        toast('📋 Copiado. Pegalo en WhatsApp');
      } catch {
        // Open a sheet with the text to copy manually
        closeSheet();
        openSheet({
          title: 'Compartir credenciales',
          body: `
            <p style="color:var(--text-dim);font-size:13px;margin:0 0 10px;">Copialo manualmente y mandalo por WhatsApp:</p>
            <div class="preview-box">${escapeHTML(text)}</div>
          `,
        });
      }
    };
    $('#sync-pull').onclick = async () => {
      toast('Refrescando...');
      const cloudData = await fetchCloudData();
      if (cloudData) {
        isApplyingRemote = true;
        state = { ...state, ...cloudData };
        applyDefaults();
        isApplyingRemote = false;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
        closeSheet();
        render();
        toast('✓ Datos actualizados de la nube');
      } else {
        toast('La nube está vacía o no se pudo leer');
      }
    };
    $('#sync-disconnect').onclick = () => {
      if (!confirm('¿Desconectar la sincronización? Los datos siguen en este celu, pero no se actualizarán con los otros.')) return;
      disconnectCloudSync();
      closeSheet();
      render();
      toast('Sincronización desconectada');
    };
  }
}

async function doImport(rawText) {
  let txt = (rawText || '').trim();
  // Be lenient: try to extract JSON if there's surrounding garbage
  if (!txt.startsWith('{')) {
    const m = txt.match(/\{[\s\S]*\}/);
    if (m) txt = m[0];
  }
  if (!txt) {
    toast('Pegá el contenido del backup primero');
    return;
  }
  let parsed;
  try {
    parsed = JSON.parse(txt);
  } catch (e) {
    toast('No es un JSON válido. ¿Pegaste el backup completo?');
    return;
  }
  if (!parsed.clubName || !Array.isArray(parsed.categories)) {
    toast('Este JSON no es un backup de esta app');
    return;
  }

  // Count contents
  let totalPlayers = 0, totalMatches = 0, totalTrainings = 0;
  parsed.categories.forEach(c => {
    totalPlayers += (c.players?.length || 0);
    totalMatches += (c.matches?.length || 0);
    totalTrainings += (c.trainings?.length || 0);
  });

  const summary = `📦 Backup encontrado:\n\n` +
    `🏆 ${parsed.clubName}\n` +
    `📋 ${parsed.categories.length} división${parsed.categories.length !== 1 ? 'es' : ''}\n` +
    `👥 ${totalPlayers} jugador${totalPlayers !== 1 ? 'es' : ''}\n` +
    `⚽ ${totalMatches} partido${totalMatches !== 1 ? 's' : ''}\n` +
    `🏃 ${totalTrainings} entrenamiento${totalTrainings !== 1 ? 's' : ''}\n\n` +
    `¿Confirmar? Reemplaza TODO lo actual.`;

  if (!confirm(summary)) return;

  state = { ...state, ...parsed, activeTab: 'players', filter: 'all' };
  applyDefaults();
  await saveState();

  // Verify save worked
  let verified = false;
  try {
    const check = await _storageGet(STORAGE_KEY);
    if (check) {
      const back = JSON.parse(check);
      verified = back.categories?.length === parsed.categories.length;
    }
  } catch {}

  closeSheet();
  isAuthenticated = true;
  needsCategoryPick = true; // show picker to verify
  render();

  if (verified) {
    toast(`✓ ${totalPlayers} jugadores importados`);
  } else {
    toast(`⚠️ Importado pero el guardado no se pudo verificar. Exportá ya por las dudas.`);
  }
}

async function resetData() {
  if (!confirm('¿BORRAR TODO? Esta acción no se puede deshacer.')) return;
  if (!confirm('Confirmá una vez más: se borran jugadores, partidos, entrenos y stats. La app queda lista en login con admin/luzfuerza2026 y divisiones Primera + Reserva.')) return;
  await _storageDelete(STORAGE_KEY);
  state = { clubName: '', activeCategoryId: null, categories: [], activeTab: 'players', filter: 'all', password: null, adminUser: 'admin' };
  applyDefaults();
  await saveState();
  isAuthenticated = false;
  needsCategoryPick = true;
  render();
}

(async function init() {
  await loadState();
  render();
  // Try to sync with cloud (will re-render if cloud data differs)
  initCloudSync().catch(e => console.warn('Cloud sync init error', e));
})();

// Expose closeSheet to inline handlers
window.closeSheet = closeSheet;
